<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pro 会员 - 一次购买，终身拥有</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: '#111827',
          }
        }
      }
    }
  </script>
</head>
<body class="bg-white text-gray-900 antialiased min-h-screen flex flex-col">

  <!-- ── Header ──────────────────────────────────── -->
  <header class="w-full max-w-6xl mx-auto px-6 py-6 flex items-center justify-between">
    <span class="text-lg font-bold tracking-tight">🚀 Pro</span>
  </header>

  <!-- ── Hero ────────────────────────────────────── -->
  <main class="flex-1 flex items-center justify-center px-6">
    <div class="w-full max-w-lg text-center">

      <!-- Badge -->
      <span class="inline-block bg-gray-100 text-gray-600 text-xs font-semibold tracking-widest uppercase px-4 py-1.5 rounded-full mb-6">
        限时特惠
      </span>

      <!-- Title -->
      <h1 class="text-4xl md:text-5xl font-extrabold tracking-tight text-brand mb-4">
        Pro 会员
      </h1>

      <!-- Subtitle -->
      <p class="text-lg text-gray-500 leading-relaxed mb-4">
        终身授权 · 无限更新 · 优先客服支持
      </p>
      <p class="text-sm text-gray-400 leading-relaxed mb-10 max-w-md mx-auto">
        一次购买，永久拥有全部功能。无需续费，享受所有版本更新与技术支援。
      </p>

      <!-- Pricing Card -->
      <div class="border border-gray-200 rounded-2xl p-8 mb-8 bg-white shadow-sm">
        <div class="text-sm text-gray-400 mb-2">一次性付费</div>
        <div class="text-6xl font-extrabold text-brand mb-2">$1</div>
        <div class="text-sm text-gray-400 mb-6">终身有效 · 7 天无条件退款</div>

        <ul class="text-left text-sm text-gray-600 space-y-3 mb-8 max-w-xs mx-auto">
          <li class="flex items-start gap-2">
            <span class="text-green-500 mt-0.5">✓</span> 全部功能无限制使用
          </li>
          <li class="flex items-start gap-2">
            <span class="text-green-500 mt-0.5">✓</span> 终身免费版本更新
          </li>
          <li class="flex items-start gap-2">
            <span class="text-green-500 mt-0.5">✓</span> 优先电子邮件客服支持
          </li>
          <li class="flex items-start gap-2">
            <span class="text-green-500 mt-0.5">✓</span> 7 天无条件全额退款
          </li>
        </ul>

        <!-- Stripe Pay Button -->
        <button id="pay-btn"
                class="w-full bg-brand text-white font-semibold py-3.5 px-6 rounded-xl hover:bg-gray-800 transition-colors duration-200 disabled:opacity-50 disabled:cursor-not-allowed">
          立即购买 · $1
        </button>
      </div>

      <!-- Trust -->
      <p class="text-xs text-gray-400">
        🔒 由 Stripe 安全处理支付 · SSL 加密传输
      </p>
    </div>
  </main>

  <!-- ── Footer ──────────────────────────────────── -->
  <footer class="text-center py-6 text-xs text-gray-300">
    © 2026 Pro. All rights reserved.
  </footer>

  <!-- ── Script ──────────────────────────────────── -->
  <script>
    const btn = document.getElementById('pay-btn');

    btn.addEventListener('click', async () => {
      btn.disabled = true;
      btn.textContent = '正在跳转...';

      try {
        const res = await fetch('/api/create-checkout-session', { method: 'POST' });
        const data = await res.json();

        if (data.url) {
          window.location.href = data.url;
        } else {
          throw new Error('未获取到支付链接');
        }
      } catch (err) {
        alert('支付初始化失败，请稍后重试');
        console.error(err);
        btn.disabled = false;
        btn.textContent = '立即购买 · $1';
      }
    });
  </script>
</body>
</html>
