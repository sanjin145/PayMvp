<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>支付成功 · Pro 会员</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: '#111827',
          }
        }
      }
    }
  </script>
</head>
<body class="bg-white text-gray-900 antialiased min-h-screen flex flex-col">

  <!-- ── Header ──────────────────────────────────── -->
  <header class="w-full max-w-6xl mx-auto px-6 py-6">
    <span class="text-lg font-bold tracking-tight">🚀 Pro</span>
  </header>

  <!-- ── Success ─────────────────────────────────── -->
  <main class="flex-1 flex items-center justify-center px-6">
    <div class="w-full max-w-md text-center">

      <!-- Check Icon -->
      <div class="w-16 h-16 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-6">
        <svg class="w-8 h-8 text-green-500" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5" />
        </svg>
      </div>

      <h1 class="text-3xl font-extrabold tracking-tight text-brand mb-3">
        支付成功！
      </h1>
      <p class="text-gray-500 mb-8">
        感谢您的购买，您现在已是 Pro 会员。
      </p>

      <!-- Order Card -->
      <div id="order-card" class="border border-gray-200 rounded-2xl p-6 bg-white shadow-sm text-left mb-8">
        <div class="text-xs text-gray-400 uppercase tracking-widest mb-4">订单详情</div>
        <div id="order-content" class="space-y-3 text-sm">
          <!-- 动态加载 -->
          <div class="animate-pulse space-y-3">
            <div class="h-4 bg-gray-100 rounded w-3/4"></div>
            <div class="h-4 bg-gray-100 rounded w-1/2"></div>
            <div class="h-4 bg-gray-100 rounded w-2/3"></div>
          </div>
        </div>
      </div>

      <a href="/"
         class="inline-block bg-brand text-white font-semibold py-3 px-8 rounded-xl hover:bg-gray-800 transition-colors duration-200">
        返回首页
      </a>
    </div>
  </main>

  <!-- ── Footer ──────────────────────────────────── -->
  <footer class="text-center py-6 text-xs text-gray-300">
    © 2026 Pro. All rights reserved.
  </footer>

  <!-- ── Script ──────────────────────────────────── -->
  <script>
    (async () => {
      const params = new URLSearchParams(window.location.search);
      const orderId = params.get('order_id');

      const container = document.getElementById('order-content');

      if (!orderId) {
        container.innerHTML = '<p class="text-gray-400">订单信息不可用</p>';
        return;
      }

      try {
        const res = await fetch(`/api/orders/${orderId}`);
        if (!res.ok) {
          container.innerHTML = '<p class="text-gray-400">订单信息加载失败</p>';
          return;
        }

        const order = await res.json();
        const amount = (order.amount / 100).toFixed(2);

        container.innerHTML = `
          <div class="flex justify-between">
            <span class="text-gray-400">订单号</span>
            <span class="font-mono text-xs text-gray-700">${escapeHtml(order.id)}</span>
          </div>
          <div class="flex justify-between">
            <span class="text-gray-400">金额</span>
            <span class="font-semibold">$${amount} ${order.currency?.toUpperCase() || 'USD'}</span>
          </div>
          <div class="flex justify-between">
            <span class="text-gray-400">邮箱</span>
            <span>${escapeHtml(order.customerEmail || '-')}</span>
          </div>
          <div class="flex justify-between">
            <span class="text-gray-400">状态</span>
            <span class="text-green-600 font-semibold">已完成</span>
          </div>
          <div class="flex justify-between">
            <span class="text-gray-400">时间</span>
            <span class="text-xs">${new Date(order.createdAt).toLocaleString('zh-CN')}</span>
          </div>
        `;
      } catch (err) {
        console.error(err);
        container.innerHTML = '<p class="text-gray-400">订单信息加载失败</p>';
      }
    })();

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }
  </script>
</body>
</html>
